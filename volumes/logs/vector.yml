api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    exclude_containers:
      - supabase-vector

transforms:
  project_logs:
    type: remap
    inputs:
      - docker_host
    source: |-
      .project = "default"
      .event_message = del(.message)
      .appname = del(.container_name)
      del(.container_id)
      del(.container_created_at)
      del(.image)
      del(.label)
      del(.source_type)
      del(.stream)

  router:
    type: route
    inputs:
      - project_logs
    route:
      kong: '.appname == "supabase-kong"'
      auth: '.appname == "supabase-auth"'
      rest: '.appname == "supabase-rest"'
      realtime: 'starts_with(string!(.appname), "realtime")'
      storage: '.appname == "supabase-storage"'
      functions: '.appname == "supabase-edge-functions"'
      db: '.appname == "ha-pg-primary" || .appname == "ha-pg-replica-1" || .appname == "ha-pg-replica-2"'

sinks:
  logflare_kong:
    type: http
    inputs:
      - router.kong
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=kong

  logflare_auth:
    type: http
    inputs:
      - router.auth
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=gotrue

  logflare_rest:
    type: http
    inputs:
      - router.rest
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=postgrest

  logflare_realtime:
    type: http
    inputs:
      - router.realtime
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=realtime

  logflare_storage:
    type: http
    inputs:
      - router.storage
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=storage

  logflare_functions:
    type: http
    inputs:
      - router.functions
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=edge-runtime

  logflare_db:
    type: http
    inputs:
      - router.db
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_PUBLIC_ACCESS_TOKEN}"
    uri: http://analytics:4000/api/logs?source_name=postgres

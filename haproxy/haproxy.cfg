global
    maxconn 100
    log stdout format raw local0

defaults
    log global
    mode tcp
    retries 2
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

# Stats page - accessible at http://haproxy:7000
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node

# Primary (read-write) - routes only to the Patroni leader
# Patroni exposes /primary on port 8008 returning 200 only on the leader
frontend pg_primary_frontend
    bind *:5432
    default_backend pg_primary_backend

backend pg_primary_backend
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-primary  pg-primary:5432  maxconn 100 check port 8008
    server pg-replica-1 pg-replica-1:5432 maxconn 100 check port 8008
    server pg-replica-2 pg-replica-2:5432 maxconn 100 check port 8008

# Replica (read-only) - routes to any healthy replica
# Patroni exposes /replica on port 8008 returning 200 only on standbys
frontend pg_replica_frontend
    bind *:5433
    default_backend pg_replica_backend

backend pg_replica_backend
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-primary  pg-primary:5432  maxconn 100 check port 8008
    server pg-replica-1 pg-replica-1:5432 maxconn 100 check port 8008
    server pg-replica-2 pg-replica-2:5432 maxconn 100 check port 8008
